<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Пользователи</title>
</head>
<body>
<h1>Список пользователей</h1>
<ul>
    <li th:each="user : ${users}">
        <span th:text="${user.id}"></span> -
        <span th:text="${user.firstName}"></span>
        <span th:text ="${user.lastName}"></span>
        (<span th:text ="${user.age}"></span> лет)

        <form th:action="@{'/users/delete/' + ${user.id}}" method="post" style="display:inline;">
            <button type="submit">Удалить</button>
        </form>
    </li>
</ul>

<h2>Добавить пользователя</h2>
<form th:action="@{/users}" method="post" th:object="${newUser}">
    Имя: <input type="text" th:field="*{firstName}" required />
    Фамилия: <input type="text" th:field="*{lastName}" required />
    Возраст: <input type="number" th:field="*{age}" min="1" required />
    <br>
    <button type="submit">Добавить</button>
</form>
</body>
</html>
